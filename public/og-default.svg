<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      .bg { fill: #f5f3ed; }
      .forest { fill: #2d4a3a; }
      .copper { fill: #b87333; }
      .wordmark { font-family: 'Libre Caslon Text', Georgia, serif; font-weight: 700; fill: #2d4a3a; letter-spacing: -0.01em; }
      .tag { font-family: 'Work Sans', 'Helvetica Neue', Arial, sans-serif; font-weight: 400; fill: #2d4a3a; letter-spacing: 0.01em; }
      .byline { font-family: 'Work Sans', 'Helvetica Neue', Arial, sans-serif; font-weight: 600; fill: #b87333; letter-spacing: 0.08em; text-transform: uppercase; font-size: 18px; }
      .formula { font-family: 'Work Sans', 'Helvetica Neue', Arial, sans-serif; font-weight: 500; fill: #2d4a3a; font-size: 28px; letter-spacing: 0.02em; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="630" />
  <circle class="copper" cx="1100" cy="130" r="10" />
  <text class="byline" x="80" y="132">GiftScored</text>
  <text x="80" y="290" font-size="86" class="wordmark">A rubric you</text>
  <text x="80" y="390" font-size="86" class="wordmark">can actually read.</text>
  <text class="formula" x="80" y="470">Brand &#38; review density (30) + Category fit (30) + Price-to-value (25) + Giftability (15)</text>
  <text class="tag" x="80" y="540" font-size="22">Methodology-first gift scoring. The weights are on the page; the math is legible.</text>
  <text class="byline" x="80" y="590">By Robin Lake · Methodology Editor</text>
</svg>
